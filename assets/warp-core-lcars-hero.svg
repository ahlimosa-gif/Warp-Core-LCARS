    <rect x="336" y="286" width="928" height="270" rx="24" fill="#000" opacity="0.82"/>
    <path d="M502 284h598" stroke="#0dd5ff" stroke-width="3" opacity="0.56" filter="url(#softGlow)"/>
    <path d="M522 584h556" stroke="#ff9e38" stroke-width="3" opacity="0.5" filter="url(#softGlow)"/>

    <g>
