    <path d="M724 224h96" stroke="#f5a65a" stroke-width="14" stroke-linecap="round"/>
    <path d="M840 224h354" stroke="#bd8259" stroke-width="14" stroke-linecap="round"/>
    <path d="M1260 224h88q58 0 58 58v72" fill="none" stroke="#f69a91" stroke-width="52" stroke-linecap="round"/>

