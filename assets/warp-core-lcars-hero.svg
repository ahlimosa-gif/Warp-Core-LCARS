      <rect x="1310" y="300" width="52" height="58" rx="10" fill="#9a72de"/>
      <path d="M1252 360h118q42 0 42 42v86q0 42-42 42h-118z" fill="#8668d5"/>
      <rect x="1252" y="546" width="42" height="62" rx="12" fill="#8fb5ff"/>
      <rect x="1252" y="622" width="42" height="56" rx="12" fill="#f5853a"/>
      <rect x="1310" y="544" width="102" height="118" rx="20" fill="#f28c2e"/>
      <path d="M1310 662h102v54h-102z" fill="#82a9e8"/>
    </g>

    <g>
      <rect x="590" y="674" width="94" height="42" rx="11" fill="#6f8ed7"/>
      <rect x="698" y="652" width="116" height="64" rx="14" fill="#dd8079"/>
      <rect x="832" y="652" width="272" height="64" rx="14" fill="#a684df"/>
      <rect x="1130" y="660" width="44" height="48" rx="11" fill="#ff8d36"/>
      <rect x="1188" y="660" width="44" height="48" rx="11" fill="#e99137"/>
      <rect x="1246" y="660" width="44" height="48" rx="11" fill="#a47add"/>
