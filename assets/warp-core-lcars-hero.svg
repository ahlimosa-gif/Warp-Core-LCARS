<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Warp-Core-LCARS README hero</title>
  <desc id="desc">A cinematic LCARS terminal interface over a glowing warp-core engine room.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity="0.95"/>
      <stop offset="28%" stop-color="#ff9b2f" stop-opacity="0.72"/>
      <stop offset="55%" stop-color="#0cc7ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#02040b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="space" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="45%" stop-color="#070916"/>
      <stop offset="100%" stop-color="#130718"/>
    </linearGradient>
    <linearGradient id="panelAmber" x1="0" x2="1">
      <stop offset="0%" stop-color="#f3a23d"/>
      <stop offset="56%" stop-color="#ffbd62"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="panelViolet" x1="0" x2="1">
      <stop offset="0%" stop-color="#8e6fe0"/>
      <stop offset="100%" stop-color="#bda0ff"/>
    </linearGradient>
    <linearGradient id="panelPeach" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffb08e"/>
      <stop offset="100%" stop-color="#ff7f6f"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" x2="1">
      <stop offset="0%" stop-color="#86b8ff"/>
      <stop offset="100%" stop-color="#5977c8"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.58"/>
    </filter>
    <pattern id="stars" width="160" height="120" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="28" r="1.4" fill="#d8ecff" opacity="0.75"/>
      <circle cx="96" cy="36" r="1" fill="#ffffff" opacity="0.55"/>
      <circle cx="138" cy="82" r="1.7" fill="#9fc7ff" opacity="0.48"/>
      <circle cx="52" cy="101" r="1.1" fill="#c7b5ff" opacity="0.65"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#space)"/>
  <rect width="1600" height="900" fill="url(#stars)" opacity="0.72"/>
  <rect width="1600" height="900" fill="url(#coreGlow)"/>

  <g opacity="0.72">
    <path d="M0 205h250c48 0 86 38 86 86v318c0 48-38 86-86 86H0v-56h225c19 0 35-16 35-35V296c0-19-16-35-35-35H0z" fill="#07111f" stroke="#23436f" stroke-width="6"/>
    <path d="M1600 205h-250c-48 0-86 38-86 86v318c0 48 38 86 86 86h250v-56h-225c-19 0-35-16-35-35V296c0-19 16-35 35-35h225z" fill="#07111f" stroke="#23436f" stroke-width="6"/>
