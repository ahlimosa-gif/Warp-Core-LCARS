  <g font-family="Arial, Helvetica, sans-serif" letter-spacing="0" text-rendering="geometricPrecision">
    <text x="800" y="395" text-anchor="middle" fill="#ffb24c" font-size="42" font-weight="700">WARP CORE LCARS</text>
    <text x="800" y="447" text-anchor="middle" fill="#94e8ff" font-size="24" font-weight="600">TERMINAL OVERRIDE ENGAGED</text>
    <text x="800" y="492" text-anchor="middle" fill="#ffe0b0" font-size="18">Node.js universal CLI • OS/2 REXX subsystem</text>
